<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate Validation</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #eef3f8, #dfe9f3);
}

.container {
  max-width: 550px;
  margin: 100px auto;
  background: white;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  text-align: center;
}

.valid { color: #28a745; }
.invalid { color: #dc3545; }

.data {
  text-align: left;
  margin-top: 20px;
  background: #f8f9fa;
  padding: 15px;
  border-radius: 10px;
}
</style>

</head>
<body>

<div class="container">
  <div id="result"></div>
</div>

<script>

const validData = [
  {
    name: "Zainul Abidin",
    code: "OPITO0RPL60CJTR",
    training: "Safety Training",
    issue: "2026",
    expire: "2028"
  }
];

// AMBIL PARAMETER
const params = new URLSearchParams(window.location.search);

// NORMALISASI (INI KUNCI NYA)
const name = (params.get("name") || "").trim().toLowerCase();
const code = (params.get("code") || "").trim().toUpperCase();

// CARI DATA
let found = validData.find(d => 
  d.name.toLowerCase() === name &&
  d.code.toUpperCase() === code
);

// DEBUG (kalau masih error)
console.log("URL Name:", name);
console.log("URL Code:", code);

// OUTPUT
if(found) {
  document.getElementById("result").innerHTML = `
    <h2 class="valid">✔ Certificate VALID</h2>
    <div class="data">
      <p><b>Name:</b> ${found.name}</p>
      <p><b>Code:</b> ${found.code}</p>
      <p><b>Training:</b> ${found.training}</p>
      <p><b>Issued:</b> ${found.issue}</p>
      <p><b>Expire:</b> ${found.expire}</p>
    </div>
  `;
} else {
  document.getElementById("result").innerHTML = `
    <h2 class="invalid">✖ NOT FOUND</h2>
    <p>Check URL parameter</p>
  `;
}

</script>

</body>
</html>
