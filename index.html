<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate Validation</title>

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #eef3f8, #dfe9f3);
  margin: 0;
}

.container {
  max-width: 550px;
  margin: 100px auto;
  background: white;
  padding: 40px;
  border-radius: 16px;
  box-shadow: 0 10px 30px rgba(0,0,0,0.15);
  text-align: center;
}

.icon {
  font-size: 60px;
  margin-bottom: 15px;
}

.valid {
  color: #28a745;
}

.invalid {
  color: #dc3545;
}

h2 {
  margin: 10px 0;
}

.data {
  text-align: left;
  margin-top: 25px;
  background: #f8f9fa;
  padding: 18px;
  border-radius: 10px;
  font-size: 15px;
}

.data p {
  margin: 8px 0;
}

.footer {
  margin-top: 30px;
  font-size: 12px;
  color: gray;
}
</style>

</head>
<body>

<div class="container">
  <div id="result"></div>

  <div class="footer">
    Official Certificate Verification System
  </div>
</div>

<script>

// DATABASE (EDIT SESUAI DATA KAMU)
const validData = [
  {
    name: "Zainul Abidin",
    code: "OPITO0RPL60CJTR",
    training: "Safety Training",
    issue: "2026",
    expire: "2028"
  }
];

// AMBIL PARAMETER URL
const params = new URLSearchParams(window.location.search);
const name = params.get("name");
const code = params.get("code");

// CARI DATA
let found = validData.find(d => d.name === name && d.code === code);

// OUTPUT
if(name && code && found) {
  document.getElementById("result").innerHTML = `
    <div class="icon valid">✔</div>
    <h2 class="valid">Certificate is VALID</h2>

    <div class="data">
      <p><b>Name:</b> ${found.name}</p>
      <p><b>Certificate Code:</b> ${found.code}</p>
      <p><b>Training:</b> ${found.training}</p>
      <p><b>Issued:</b> ${found.issue}</p>
      <p><b>Expire:</b> ${found.expire}</p>
    </div>
  `;
} else {
  document.getElementById("result").innerHTML = `
    <div class="icon invalid">✖</div>
    <h2 class="invalid">Certificate NOT FOUND</h2>
    <p>Invalid or missing certificate data.</p>
  `;
}

</script>

</body>
</html>
