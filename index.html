<!DOCTYPE html>
<html>
<head>
  <title>Certificate Validation</title>
  <style>
    body {
      font-family: Arial;
      background: #f5f5f5;
      text-align: center;
      padding: 40px;
    }
    .box {
      background: white;
      padding: 30px;
      border-radius: 10px;
      width: 300px;
      margin: auto;
      box-shadow: 0 0 10px rgba(0,0,0,0.1);
    }
    input {
      width: 100%;
      padding: 10px;
      margin: 10px 0;
    }
    button {
      padding: 10px;
      width: 100%;
      background: #007BFF;
      color: white;
      border: none;
      cursor: pointer;
    }
    #result {
      margin-top: 20px;
    }
  </style>
</head>
<body>

<div class="box">
  <h2>Validate Certificate</h2>

  <input type="text" id="name" placeholder="Nama">
  <input type="text" id="code" placeholder="Certificate Code">

  <button onclick="check()">Validate</button>

  <div id="result"></div>
</div>

<script>
  const params = new URLSearchParams(window.location.search);
  const name = params.get("name");
  const code = params.get("code");

  function check(name, code) {
    if(name === "Zainul Abidin" && code === "OPITO0RPL60CJTR") {
      document.getElementById("result").innerHTML =
        "<h3 style='color:green'>Certificate is VALID</h3>" +
        "<p><b>Nama:</b> " + name + "</p>" +
        "<p>Training completed</p>" +
        "<p>Expire: 2028</p>";
    } else {
      document.getElementById("result").innerHTML =
        "<h3 style='color:red'>Data tidak ditemukan</h3>";
    }
  }

  // AUTO JALAN SAAT HALAMAN DIBUKA
  if(name && code) {
    check(name, code);
  }
</script>

</body>
</html>
