<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  margin: 0;
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #e9eff5, #dfe7ef);
}

/* CONTAINER */
.container {
  max-width: 600px;
  margin: 100px auto;
  background: #ffffff;
  padding: 40px;
  border-radius: 18px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
  text-align: center;
}

/* ICON */
.icon {
  font-size: 65px;
  color: #28a745;
  margin-bottom: 10px;
}

/* TITLE */
.title {
  font-size: 24px;
  font-weight: bold;
  color: #28a745;
  margin-bottom: 10px;
}

/* SUB */
.sub {
  color: #555;
  margin-bottom: 25px;
}

/* DATA BOX */
.data {
  text-align: left;
  background: #f4f6f9;
  padding: 20px;
  border-radius: 12px;
}

.data p {
  margin: 8px 0;
  font-size: 15px;
}

/* FOOTER */
.footer {
  margin-top: 25px;
  font-size: 12px;
  color: gray;
}
</style>

</head>
<body>

<div class="container">

  <div class="icon">✔</div>
  <div class="title">Certificate is VALID</div>
  <div class="sub">This certificate has been successfully verified.</div>

  <div class="data">
    <p><b>Name:</b> Wiji</p>
    <p><b>Certificate Code:</b> OPITOYB6G82AZO</p>
    <p><b>Training:</b> Banksman and Slinger Initial Training</p>
    <p><b>Issued:</b> 15 January 2024</p>
    <p><b>Expire:</b> 14 September 2026</p>
  </div>

  <div class="footer">
    Official Certificate Verification System
  </div>

</div>

</body>
</html>
