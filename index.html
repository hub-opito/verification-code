<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Certificate Validation</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #eef3f8;
      margin: 0;
      padding: 0;
    }

    .container {
      max-width: 500px;
      margin: 80px auto;
      background: white;
      padding: 30px;
      border-radius: 12px;
      box-shadow: 0 5px 20px rgba(0,0,0,0.1);
      text-align: center;
    }

    h2 {
      margin-bottom: 20px;
    }

    .status-valid {
      color: green;
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 15px;
    }

    .status-invalid {
      color: red;
      font-weight: bold;
      font-size: 20px;
      margin-bottom: 15px;
    }

    .data {
      text-align: left;
      margin-top: 20px;
    }

    .data p {
      margin: 8px 0;
    }

    .footer {
      margin-top: 30px;
      font-size: 12px;
      color: gray;
    }
  </style>
</head>
<body>

<div class="container">
  <h2>Certificate Validation</h2>

  <div id="result"></div>

  <div class="footer">
    This is a certificate verification system
  </div>
</div>

<script>
window.onload = function() {
  const params = new URLSearchParams(window.location.search);
  const name = params.get("name");
  const code = params.get("code");

  // DATA VALID (bisa kamu tambah)
  const validData = [
    {
      name: "Zainul Abidin",
      code: "OPITO0RPL60CJTR",
      training: "Safety Training",
      issue: "2026",
      expire: "2028"
    }
  ];

  let found = validData.find(d => d.name === name && d.code === code);

  if(name && code && found) {
    document.getElementById("result").innerHTML = 
      <div class="status-valid">✔ Certificate is VALID</div>
      <div class="data">
        <p><b>Name:</b> ${found.name}</p>
        <p><b>Certificate Code:</b> ${found.code}</p>
        <p><b>Training:</b> ${found.training}</p>
        <p><b>Issued:</b> ${found.issue}</p>
        <p><b>Expire:</b> ${found.expire}</p>
      </div>
    ;
  } else {
    document.getElementById("result").innerHTML = 
      <div class="status-invalid">✖ Certificate NOT FOUND</div>
    ;
  }
}
</script>

</body>
</html>
