<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Certificate Verification</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body {
  font-family: 'Segoe UI', sans-serif;
  background: linear-gradient(135deg, #e9eff5, #dfe7ef);
  margin: 0;
}

.container {
  max-width: 600px;
  margin: 80px auto;
  background: white;
  padding: 40px;
  border-radius: 18px;
  box-shadow: 0 15px 40px rgba(0,0,0,0.15);
  text-align: center;
}

/* HEADER */
.header {
  margin-bottom: 20px;
}

.header h1 {
  margin: 0;
  font-size: 22px;
  letter-spacing: 1px;
}

/* STATUS ICON */
.icon {
  font-size: 60px;
  margin: 15px 0;
}

.valid { color: #28a745; }
.invalid { color: #dc3545; }

/* DATA BOX */
.data {
  text-align: left;
  margin-top: 25px;
  background: #f4f6f9;
  padding: 18px;
  border-radius: 12px;
}

.data p {
  margin: 8px 0;
  font-size: 15px;
}

/* FOOTER */
.footer {
  margin-top: 30px;
  font-size: 12px;
  color: gray;
}
</style>

</head>
<body>

<div class="container">

  <div class="header">
    <h1>Certificate Verification</h1>
  </div>

  <div id="result"></div>

  <div class="footer">
    Official Certificate Verification System
  </div>

</div>

<script>

// AMBIL PARAMETER DARI URL
const params = new URLSearchParams(window.location.search);

const name = params.get("name");
const code = params.get("code");

// TAMPILKAN HASIL
if(name && code){

  document.getElementById("result").innerHTML = `
    <div class="icon valid">✔</div>
    <h2 class="valid">Certificate is VALID</h2>

    <div class="data">
      <p><b>Name:</b> ${decodeURIComponent(name)}</p>
      <p><b>Certificate Code:</b> ${code}</p>
      <p><b>Status:</b> Verified</p>
      <p><b>Issued:</b> 15 January 2024</p>
      <p><b>Expire:</b> 14 September 2026</p>
    </div>
  `;

} else {

  document.getElementById("result").innerHTML = `
    <div class="icon invalid">✖</div>
    <h2 class="invalid">Certificate NOT FOUND</h2>
    <p>Please scan a valid certificate QR code.</p>
  `;

}

</script>

</body>
</html>
